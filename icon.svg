<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="60%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="72" y1="180" x2="440" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="72" y1="260" x2="440" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="72" y1="340" x2="440" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Area fill under the line -->
  <path d="M88,310 C140,280 185,240 230,255 C275,270 315,175 362,145 C385,130 415,118 440,108 L440,390 L88,390 Z"
        fill="url(#fill)"/>

  <!-- Trend line with glow -->
  <path d="M88,310 C140,280 185,240 230,255 C275,270 315,175 362,145 C385,130 415,118 440,108"
        fill="none" stroke="url(#line)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Data point dots -->
  <circle cx="88"  cy="310" r="8"  fill="#FFB800" opacity="0.7"/>
  <circle cx="230" cy="255" r="8"  fill="#FF9500" opacity="0.8"/>
  <circle cx="362" cy="145" r="8"  fill="#FF7B00" opacity="0.9"/>

  <!-- Terminal dot (highlighted) -->
  <circle cx="440" cy="108" r="14" fill="#1A1A2E" stroke="url(#line)" stroke-width="4"/>
  <circle cx="440" cy="108" r="6"  fill="white"/>
</svg>
