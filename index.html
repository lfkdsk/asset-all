<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>资产总览</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">

  <!-- iOS PWA (standalone + immersive) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="资产">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Setup Screen -->
<div id="screen-setup" class="screen hidden">
  <div class="setup-container">
    <div class="setup-logo">
      <div class="setup-icon"><img src="icon.svg" alt="资产总览"></div>
      <h1>资产总览</h1>
      <p>连接你的 GitHub 仓库以开始追踪资产</p>
    </div>
    <form id="form-setup" class="setup-form">
      <div class="form-group">
        <label>GitHub Token</label>
        <input type="password" id="setup-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" required>
        <span class="form-hint">需要 repo 读写权限</span>
      </div>
      <div class="form-group">
        <label>仓库所有者</label>
        <input type="text" id="setup-owner" placeholder="username" required>
      </div>
      <div class="form-group">
        <label>仓库名称</label>
        <input type="text" id="setup-repo" placeholder="my-assets" required>
      </div>
      <div class="form-group">
        <label>分支</label>
        <input type="text" id="setup-branch" placeholder="main" value="main">
      </div>
      <div class="form-group">
        <label>本位币</label>
        <select id="setup-currency">
          <option value="CNY">CNY — 人民币</option>
          <option value="USD">USD — 美元</option>
          <option value="EUR">EUR — 欧元</option>
          <option value="HKD">HKD — 港元</option>
          <option value="JPY">JPY — 日元</option>
          <option value="GBP">GBP — 英镑</option>
          <option value="SGD">SGD — 新加坡元</option>
          <option value="AUD">AUD — 澳元</option>
          <option value="CAD">CAD — 加元</option>
          <option value="CHF">CHF — 瑞士法郎</option>
        </select>
      </div>
      <button type="submit" class="btn-primary btn-full" id="btn-setup-save">
        <span class="btn-text">开始使用</span>
        <span class="btn-loading hidden">连接中...</span>
      </button>
      <p id="setup-error" class="error-text hidden"></p>
    </form>
  </div>
</div>

<!-- Main Dashboard Screen -->
<div id="screen-dashboard" class="screen hidden">
  <!-- Header -->
  <header class="app-header">
    <button class="icon-btn" id="btn-settings" title="设置">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <h1 class="app-title">资产总览</h1>
    <button class="icon-btn" id="btn-refresh" title="刷新">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
  </header>

  <!-- Loading State -->
  <div id="dashboard-loading" class="loading-state hidden">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>

  <!-- Dashboard Content -->
  <div id="dashboard-content">
    <!-- Total Card -->
    <div class="total-card">
      <div class="total-label">总资产<button id="btn-toggle-mask" class="mask-toggle" aria-label="隐藏资产数据"><svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div>
      <div class="total-amount" id="total-amount">--</div>
      <div id="total-usd" class="total-usd"></div>
      <div class="total-meta">
        <span id="total-currency-badge" class="currency-badge"></span>
        <span id="total-change" class="total-change"></span>
      </div>
      <div class="total-date-wrapper">
        <div class="total-date" id="total-date"></div>
        <div id="fx-tooltip" class="fx-tooltip hidden"></div>
      </div>
    </div>

    <!-- Trend Chart -->
    <div class="card chart-card">
      <div class="card-header">
        <span class="card-title">资产趋势</span>
        <span id="chart-no-data" class="no-data-hint hidden">暂无历史数据</span>
      </div>
      <div id="chart-period-change" class="chart-period-change hidden"></div>
      <div class="chart-wrapper">
        <canvas id="trend-chart"></canvas>
      </div>
      <div class="chart-range-bar">
        <button class="range-btn active" data-range="1M">1M</button>
        <button class="range-btn" data-range="3M">3M</button>
        <button class="range-btn" data-range="6M">6M</button>
        <button class="range-btn" data-range="1Y">1Y</button>
        <button class="range-btn" data-range="3Y">3Y</button>
        <button class="range-btn" data-range="ALL">ALL</button>
      </div>
    </div>

    <!-- Asset Items -->
    <div class="card assets-card">
      <div class="card-header">
        <span class="card-title">资产明细</span>
        <button class="btn-add" id="btn-add-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          添加
        </button>
      </div>
      <div id="snapshot-view-banner" class="snapshot-view-banner hidden">
        <span id="snapshot-view-date"></span>
        <button class="btn-small btn-accent" id="btn-snapshot-back">返回当前</button>
      </div>
      <div id="asset-list" class="asset-list"></div>
      <div id="asset-list-empty" class="empty-state hidden">
        <p>暂无资产记录</p>
        <button class="btn-primary" id="btn-add-first">添加第一条记录</button>
      </div>
    </div>

    <!-- Save / Snapshot Button -->
    <div class="bottom-action" id="bottom-action">
      <button class="btn-save" id="btn-save-snapshot" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        <span id="btn-save-text">保存快照</span>
      </button>
    </div>
  </div>
</div>

    <div class="panel-body">

        <select id="settings-currency" class="settings-select">

          <option value="USD">USD — 美元</option>
          <option value="EUR">EUR — 欧元</option>
          <option value="HKD">HKD — 港元</option>
          <option value="JPY">JPY — 日元</option>
          <option value="GBP">GBP — 英镑</option>
          <option value="SGD">SGD — 新加坡元</option>
          <option value="AUD">AUD — 澳元</option>
          <option value="CAD">CAD — 加元</option>
          <option value="CHF">CHF — 瑞士法郎</option>
          <option value="INR">INR — 印度卢比</option>
          <option value="KRW">KRW — 韩元</option>
          <option value="BRL">BRL — 巴西雷亚尔</option>
          <option value="MXN">MXN — 墨西哥比索</option>
          <option value="SEK">SEK — 瑞典克朗</option>
          <option value="NOK">NOK — 挪威克朗</option>
          <option value="DKK">DKK — 丹麦克朗</option>
          <option value="NZD">NZD — 新西兰元</option>
          <option value="ZAR">ZAR — 南非兰特</option>
          <option value="THB">THB — 泰铢</option>

      </div>
      <div class="settings-section">
        <div class="settings-section-title">GitHub 配置</div>
        <div class="form-group">
          <label>Token</label>
          <input type="password" id="settings-token" autocomplete="off">
        </div>
        <div class="form-group">
          <label>仓库所有者</label>
          <input type="text" id="settings-owner">
        </div>
        <div class="form-group">
          <label>仓库名称</label>
          <input type="text" id="settings-repo">
        </div>
        <div class="form-group">
          <label>分支</label>
          <input type="text" id="settings-branch">
        </div>
        <button class="btn-primary btn-full" id="btn-settings-save">保存配置</button>

      </div>
      <div class="settings-section">
        <div class="settings-section-title">管理快照</div>

      <div class="settings-section">

  </div>
</div>

</div>

<!-- Toast Notification -->
<div id="toast" class="toast hidden"></div>

<script>
(async function versionCheck() {
  const LOCAL_VER_KEY = 'asset_tracker_version';
  try {
    const res = await fetch('./version.json?' + Date.now());
    if (!res.ok) return;
    const { version } = await res.json();
    const local = localStorage.getItem(LOCAL_VER_KEY);
    if (local && local !== version) {
      // Nuke caches
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      // Unregister service workers
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      localStorage.setItem(LOCAL_VER_KEY, version);
      window.location.replace('./?v=' + Date.now());
      return;
    }
    localStorage.setItem(LOCAL_VER_KEY, version);
  } catch (_) { /* offline or fetch failed, skip */ }
})();
</script>
<script src="app.js"></script>
</body>
